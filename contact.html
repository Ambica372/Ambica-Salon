<section class="section">

<h2>Book Your Salon Appointment</h2>

<p>Fill in your details and our stylist will confirm your appointment shortly.</p>

<form onsubmit="submitForm(); return false;" class="booking-form">

<input id="name" type="text" placeholder="Full Name" required>

<input id="phone" type="text" placeholder="Phone Number" required>

<input id="email" type="email" placeholder="Email Address">

<select id="service">
<option>Select Service</option>
<option>Hair Styling</option>
<option>Hair Cut</option>
<option>Facial Treatment</option>
<option>Bridal Makeup</option>
<option>Spa</option>
</select>

<input type="date">

<select>
<option>Select Time</option>
<option>10:00 AM</option>
<option>12:00 PM</option>
<option>2:00 PM</option>
<option>4:00 PM</option>
<option>6:00 PM</option>
</select>

<textarea placeholder="Special Request (Optional)"></textarea>

<button type="submit">Confirm Appointment</button>

</form>

</section>
