<!DOCTYPE html>
<html>
<head>

<title>Contact</title>

<script>
function trackEvent(name){
window.dataLayer = window.dataLayer || [];
dataLayer.push({event:name});
}
</script>

</head>

<body>

<h1>Contact Ambica Salon</h1>

<a href="tel:+919876543210" onclick="trackEvent('phone_click')">
<button>Call Now</button>
</a>

<a href="mailto:contact@ambicasalon.com" onclick="trackEvent('email_click')">
<button>Email</button>
</a>

<a href="https://maps.google.com" target="_blank" onclick="trackEvent('map_open_click')">
<button>Open Map</button>
</a>

<h2>Book Appointment</h2>

<form onsubmit="trackEvent('appointment_submit')">

<input type="text" placeholder="Name"
onfocus="trackEvent('form_name_focus')">

<input type="text" placeholder="Phone"
onfocus="trackEvent('form_phone_focus')">

<select onchange="trackEvent('service_select')">

<option>Hair Styling</option>
<option>Makeup</option>
<option>Facial</option>

</select>

<button type="submit">Submit</button>

</form>

</body>
</html>
